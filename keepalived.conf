vrrp_script chk_apisix {
    script "/etc/keepalived/check_apisix.sh"
    interval 2
    weight -20
    fall 3
    rise 2
}

vrrp_instance VI_1 {
    state MASTER
    interface eth0                      # 换成实际网卡名 (ip a 查看)
    virtual_router_id 51
    priority 100
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass your_password_here
    }
    virtual_ipaddress {
        192.168.1.100/24
    }
    track_script {
        chk_apisix
    }
}
